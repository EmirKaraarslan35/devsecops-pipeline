# =============================================================
# DevSecOps Pipeline - BİRLEŞİK GÜVENLİK HATTI (v2)
# =============================================================
# Tüm güvenlik taramalarını tek çatı altında birleştirir.
# Her push ve PR'da 5 paralel kontrol çalışır:
#   1. SAST (Bandit) - Statik kod analizi
#   2. Bağımlılık Kontrolü (pip-audit) - Python kütüphane güvenliği
#   3. OWASP Dependency-Check - Kapsamlı bağımlılık taraması (NVD)
#   4. Secret Scanning (Gitleaks) - Şifre/API key taraması
#   5. Unit Tests (pytest) - Birim testleri
# Tümü başarılı → Güvenlik Kapısı açılır → Deploy izni
# Biri bile başarısız → Kod canlıya ÇIKAMAZ
# =============================================================

name: "🔒 DevSecOps Güvenlik Hattı"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ═══════════════════════════════════════════════════════════
  # 1. SAST - Statik Kod Güvenlik Analizi (Bandit)
  # ═══════════════════════════════════════════════════════════
  sast-scan:
    name: "🔍 SAST - Bandit Kod Taraması"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Kodu İndir"
        uses: actions/checkout@v4

      - name: "🐍 Python Kur"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "📦 Bandit Kur"
        run: pip install bandit[toml]

      - name: "📋 Tam Tarama Raporu"
        run: |
          echo "════════════════════════════════════════"
          echo "🔍 SAST - Bandit Statik Analiz Başlıyor"
          echo "════════════════════════════════════════"
          bandit -r src/ \
            -f json \
            -o bandit-report.json \
            --severity-level low \
            --confidence-level low \
            --exit-zero
          bandit -r src/ -f screen --exit-zero

      - name: "💾 Bandit Raporunu Kaydet"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sast-report
          path: bandit-report.json
          retention-days: 30

      - name: "🚦 SAST Güvenlik Kapısı"
        run: |
          echo "🚦 Medium+ seviye açık kontrolü..."
          bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            -f screen
          if [ $? -eq 0 ]; then
            echo "✅ SAST kontrolü geçti!"
          else
            echo "❌ SAST kontrolü BAŞARISIZ!"
            exit 1
          fi

  # ═══════════════════════════════════════════════════════════
  # 2. Bağımlılık Güvenlik Kontrolü (pip-audit)
  # ═══════════════════════════════════════════════════════════
  dependency-scan:
    name: "📦 Bağımlılık Kontrolü (pip-audit)"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Kodu İndir"
        uses: actions/checkout@v4

      - name: "🐍 Python Kur"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "📦 pip-audit Kur"
        run: pip install pip-audit

      - name: "🔍 Bağımlılık Taraması"
        run: |
          echo "════════════════════════════════════════"
          echo "📦 pip-audit Bağımlılık Taraması"
          echo "════════════════════════════════════════"
          pip-audit -r requirements.txt --desc --format columns
          if [ $? -eq 0 ]; then
            echo "✅ Tüm bağımlılıklar güvenli!"
          else
            echo "❌ Güvenlik açığı olan bağımlılık bulundu!"
            exit 1
          fi

      - name: "📋 JSON Rapor"
        if: always()
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --desc || true

      - name: "💾 Raporu Kaydet"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # 3. OWASP Dependency-Check (NVD Veritabanı Taraması)
  # ═══════════════════════════════════════════════════════════
  owasp-dependency-check:
    name: "🛡️ OWASP Dependency-Check"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Kodu İndir"
        uses: actions/checkout@v4

      - name: "🐍 Python Kur"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "📦 Bağımlılıkları Kur"
        run: pip install -r requirements.txt

      - name: "🛡️ OWASP Dependency-Check Taraması"
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: "devsecops-pipeline"
          path: "."
          format: "HTML"
          out: "reports"
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: "💾 OWASP Raporunu Kaydet"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # 4. Gizli Bilgi Taraması (Gitleaks)
  # ═══════════════════════════════════════════════════════════
  secret-scan:
    name: "🔑 Gizli Bilgi Taraması (Gitleaks)"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Kodu İndir"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔍 Gitleaks - Şifre/API Key Taraması"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════
  # 5. Birim Testleri (pytest)
  # ═══════════════════════════════════════════════════════════
  unit-tests:
    name: "🧪 Birim Testleri (pytest)"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Kodu İndir"
        uses: actions/checkout@v4

      - name: "🐍 Python Kur"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "📦 Bağımlılıkları Kur"
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: "🧪 Testleri Çalıştır"
        run: |
          echo "════════════════════════════════════════"
          echo "🧪 Birim Testleri Başlıyor"
          echo "════════════════════════════════════════"
          pytest tests/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=html:coverage-report
          echo ""
          echo "✅ Tüm testler başarılı!"

      - name: "💾 Coverage Raporunu Kaydet"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage-report
          path: coverage-report/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # 6. GÜVENLİK KAPISI - Tüm Kontrollerin Sonucu
  # ═══════════════════════════════════════════════════════════
  security-gate:
    name: "🚦 Güvenlik Kapısı"
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan, owasp-dependency-check, secret-scan, unit-tests]
    if: always()

    steps:
      - name: "🚦 Güvenlik Kapısı Kararı"
        run: |
          echo "════════════════════════════════════════"
          echo "🚦 GÜVENLİK KAPISI - SONUÇ RAPORU"
          echo "════════════════════════════════════════"
          echo ""
          echo "📋 Kontrol Sonuçları:"
          echo "  🔍 SAST (Bandit):              ${{ needs.sast-scan.result }}"
          echo "  📦 Bağımlılık (pip-audit):      ${{ needs.dependency-scan.result }}"
          echo "  🛡️ OWASP Dependency-Check:      ${{ needs.owasp-dependency-check.result }}"
          echo "  🔑 Gizli Bilgi (Gitleaks):      ${{ needs.secret-scan.result }}"
          echo "  🧪 Birim Testleri (pytest):     ${{ needs.unit-tests.result }}"
          echo ""

          FAILED=0

          if [[ "${{ needs.sast-scan.result }}" != "success" ]]; then
            echo "❌ SAST kontrolü başarısız!"
            FAILED=1
          fi
          if [[ "${{ needs.dependency-scan.result }}" != "success" ]]; then
            echo "❌ Bağımlılık kontrolü başarısız!"
            FAILED=1
          fi
          if [[ "${{ needs.owasp-dependency-check.result }}" != "success" ]]; then
            echo "❌ OWASP Dependency-Check başarısız!"
            FAILED=1
          fi
          if [[ "${{ needs.secret-scan.result }}" != "success" ]]; then
            echo "❌ Gizli bilgi taraması başarısız!"
            FAILED=1
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "❌ Birim testleri başarısız!"
            FAILED=1
          fi

          echo ""
          if [ $FAILED -eq 0 ]; then
            echo "════════════════════════════════════════"
            echo "✅ TÜM GÜVENLİK TESTLERİ BAŞARILI!"
            echo "   Kod canlıya alınabilir."
            echo "════════════════════════════════════════"
          else
            echo "════════════════════════════════════════"
            echo "❌ GÜVENLİK KAPISI BAŞARISIZ!"
            echo "   Kod canlıya ALINAMAZ."
            echo "   Başarısız kontrolleri düzeltin."
            echo "════════════════════════════════════════"
            exit 1
          fi

  # ═══════════════════════════════════════════════════════════
  # 7. DEPLOY - Güvenlik Kapısını Geçerse
  # ═══════════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy (Canlıya Alma)"
    runs-on: ubuntu-latest
    needs: [security-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "🚀 Deploy İşlemi"
        run: |
          echo "════════════════════════════════════════"
          echo "🚀 DEPLOY - Canlıya Alma"
          echo "════════════════════════════════════════"
          echo ""
          echo "Tüm güvenlik testlerinden geçen kod"
          echo "canlı ortama alınıyor..."
          echo ""
          echo "✅ Deploy başarıyla tamamlandı!"
          echo "📅 Tarih: $(date)"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Kullanıcı: ${{ github.actor }}"
