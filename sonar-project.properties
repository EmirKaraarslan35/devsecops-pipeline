# ===================================
# SonarQube Proje Konfigürasyonu
# ===================================

# Proje tanımlama
sonar.projectKey=devsecops-pipeline
sonar.projectName=DevSecOps Pipeline
sonar.projectVersion=1.0.0

# Kaynak kod dizini
sonar.sources=src
sonar.tests=tests

# Python ayarları
sonar.language=py
sonar.python.version=3.12

# Encoding
sonar.sourceEncoding=UTF-8

# Hariç tutulacak dosyalar
sonar.exclusions=**/*.bak,**/venv/**,**/__pycache__/**

# Test coverage raporu (pytest-cov tarafından üretilir)
sonar.python.coverage.reportPaths=coverage.xml
